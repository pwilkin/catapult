<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Catapult drawing, scaled and centered -->
  <g transform="translate(28,20) scale(8.3)" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Base platform -->
    <line x1="3" y1="24" x2="21" y2="24"/>
    <!-- Wheels -->
    <circle cx="6" cy="24" r="1.5" fill="#ffffff" stroke="none"/>
    <circle cx="18" cy="24" r="1.5" fill="#ffffff" stroke="none"/>
    <!-- A-frame support -->
    <line x1="9" y1="24" x2="12" y2="12"/>
    <line x1="15" y1="24" x2="12" y2="12"/>
    <!-- Cross brace -->
    <line x1="10.5" y1="18" x2="13.5" y2="18"/>
    <!-- Throwing arm -->
    <line x1="4" y1="7" x2="18" y2="16"/>
    <!-- Counterweight -->
    <rect x="16.5" y="15.5" width="3" height="2.5" rx="0.5" fill="#ffffff" stroke="none"/>
    <!-- Projectile -->
    <circle cx="3.5" cy="6" r="2" fill="#fbbf24" stroke="none"/>
  </g>
</svg>
